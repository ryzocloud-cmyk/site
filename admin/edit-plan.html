<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Hosting Plan</title>

<link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<div class="content">

<h1>Edit Plan</h1>

<form>

<label>Category</label>

<select>
<option selected>AMD Ryzen 9</option>
<option>AMD EPYC</option>
<option>AMD Ryzen 7</option>
<option>VPS Hosting</option>
<option>Bot Hosting</option>
<option>Web Hosting</option>
</select>

<label>Plan Name</label>
<input type="text" value="Premium 4GB">

<label>Change Image</label>
<input type="file">

<label>Price</label>
<input type="text" value="149">

<label>RAM</label>
<input type="number" value="4">

<label>CPU</label>
<input type="number" value="100">

<label>Disk</label>
<input type="number" value="20">

<label>Ports</label>
<input type="number" value="2">

<label>Databases</label>
<input type="number" value="2">

<label>Backups</label>
<input type="number" value="2">

<label>Buy Link</label>
<input type="url" value="https://example.com">

<button type="submit">
Update Plan
</button>

</form>

</div>

</body>
</html>
