<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Hosting Plan</title>

<link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<div class="content">

<h1>Add New Hosting Plan</h1>

<form>

<label>Category</label>

<select>
<option>AMD EPYC</option>
<option>AMD Ryzen 7</option>
<option>AMD Ryzen 9</option>
<option>VPS Hosting</option>
<option>Bot Hosting</option>
<option>Web Hosting</option>
</select>

<label>Plan Name</label>
<input type="text" placeholder="Premium 4GB">

<label>Plan Image</label>
<input type="file">

<label>Price</label>
<input type="text" placeholder="149">

<label>RAM (GB)</label>
<input type="number">

<label>CPU (%)</label>
<input type="number">

<label>Disk (GB)</label>
<input type="number">

<label>Ports</label>
<input type="number">

<label>Databases</label>
<input type="number">

<label>Backups</label>
<input type="number">

<label>Buy Link</label>
<input type="url" placeholder="https://">

<button type="submit">
Save Plan
</button>

</form>

</div>

</body>
</html>
